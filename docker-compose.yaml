# Local-dev / production-shape compose for needle.
#
# Pulls the published image from kibble by default; override
# NEEDLE_TAG to pin a specific version. The data tree lives in a
# named volume so the admin endpoints can write into it without
# leaking state across runs (``docker compose down -v`` resets).
#
# The CI E2E suite at tests/test_e2e.py uses a locally-built image
# instead — see .github/workflows/test.yml.

services:
  needle:
    image: kibble.apps.blindhub.ca/cobdfamily/needle:${NEEDLE_TAG:-latest}
    container_name: needle
    ports:
      - "${NEEDLE_HTTP_PORT:-8000}:8000"
    volumes:
      # :rw because the /admin/* endpoints write into the dbase
      # tree. For an identification-only deployment, change to :ro
      # and seed the volume out-of-band (see DEPLOYMENT.md).
      - needle-data:/data:rw
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/', timeout=2).status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    # Container hardening, same shape as lwe v0.9.0:
    #
    # * read_only locks the root filesystem so code execution
    #   inside the container can't persist by dropping files.
    #   /tmp is tmpfs because url2code writes uploads under
    #   /tmp/needle/uploads/<endpoint>/ during every request.
    # * /data stays its own bind / named volume (declared above),
    #   :rw because the /admin/* endpoints write the .pklz files
    #   into the tree.
    # * cap_drop ALL -- needle needs no Linux capabilities. It
    #   doesn't bind privileged ports or fiddle with networking.
    # * no-new-privileges blocks setuid binaries from elevating.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  needle-data:
