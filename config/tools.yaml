  # ====================================================================
  # admin — write paths into the database tree
  #
  # NO BUILT-IN AUTH. These endpoints mutate the bind-mounted /data
  # tree. The deploy host is expected to gate them at the proxy
  # layer with an API key (see DEPLOYMENT.md). The data volume
  # must also be mounted ``:rw`` for these to succeed.
  #
  # Track names in the .pklz files come from the upload's on-disk
  # filename, which url2code generates as random hex. Operators
  # who need stable IDs in the DB should pre-stage their audio
  # files with the right names and use audfprint directly, OR
  # store a side-table mapping the random hex back to canonical
  # IDs after each /admin/library/add call (the response echoes
  # the saved filename so the mapping is recoverable).
  # ====================================================================

  - name: admin-library-add
    route: /admin/library/add
    method: POST
    description: >-
      Add an audio file to ``<category>/library.pklz`` (the coarse,
      multi-file database) under canonical id ``{id}``. Density
      defaults to 20 hashes/sec. The /identify call returns
      ``matched`` as ``/tmp/needle/uploads/admin-library-add/{id}.<ext>``,
      so the trailing path component is the canonical id.
    defaults:
      density: "20"
    command:
      executable: /app/bin/audfprint
      # ``audfprint add`` rebuilds the entire library.pklz
      # in memory each call -- linearly proportional to
      # existing library size + the new file. 120s is
      # comfortable on a library of a few hundred entries.
      # Operators with much larger libraries should override
      # this via the same field.
      timeout_seconds: 120
      args:
        - "add"
        - "-d"
        - "/data/{category}/library.pklz"
        - "-n"
        - "{density}"
        - "{audio}"
    request:
      validations:
        category:
          type: enum
          choices: [films, tvshows, youtube, shorts, reels]
        id:
          type: text
        density:
          type: number
    uploads:
      - field_name: audio
        placeholder: audio
        temp_dir: /tmp/needle/uploads/admin-library-add
        # Save the upload as ``<id>.<ext>`` so audfprint records
        # the canonical id (rather than a random hex token) as the
        # entry's track name in library.pklz.
        name_template: "{id}"
    output:
      # ``audfprint add`` logs "Saved fprints for ..." through
      # Python's logging module — which lands on stderr, not
      # stdout — so a regex parser against stdout finds nothing
      # even on success. Use text mode and trust the exit code:
      # HTTP 200 == add succeeded; the .pklz on disk now contains
      # the new entry. Verify via /admin/library/list.
      mode: text

  - name: admin-fine-build
    route: /admin/fine/build
    method: POST
    description: >-
      Create the fine-grained single-file database at
      ``<category>/fine/<id>.pklz`` from one audio upload. Density
      defaults to 40 hashes/sec — twice what library.pklz uses,
      for sub-second timestamp precision in the /timestamps call.
    defaults:
      density: "40"
    command:
      executable: /app/bin/audfprint
      # ``audfprint new`` against a feature-length film at
      # density 40 takes the longest of any endpoint --
      # easily a couple of minutes on slower hardware. 300s
      # is the upper bound we'll tolerate before refusing;
      # an operator who needs more should be reindexing
      # offline, not through the HTTP surface.
      timeout_seconds: 300
      args:
        - "new"
        - "-d"
        - "/data/{category}/fine/{id}.pklz"
        - "-n"
        - "{density}"
        - "{audio}"
    request:
      validations:
        category:
          type: enum
          choices: [films, tvshows, youtube, shorts, reels]
        id:
          type: text
        density:
          type: number
    uploads:
      - field_name: audio
        placeholder: audio
        temp_dir: /tmp/needle/uploads/admin-fine-build
        # Saving as ``<id>.<ext>`` is cosmetic for /admin/fine/build
        # — the per-file fine pklz is keyed by id at the path layer
        # already — but it makes the entry name in the pklz match,
        # which keeps the /timestamps response readable.
        name_template: "{id}"
    output:
      # See admin-library-add — audfprint new logs through Python
      # logging (stderr); stdout is empty even on success.
      mode: text

  - name: admin-categories
    route: /admin/categories
    method: GET
    description: >-
      Return the curated catalog of categories this deployment
      knows about. Each entry is a {slug, name, description,
      library_density, fine_density, min_count} object. Use the
      `slug` field as the `category` form param on /admin/* and
      as the route prefix on /<category>/identify and
      /<category>/timestamps.
    command:
      # The catalog is authored as YAML (config/categories.yaml)
      # so operators can edit with comments. cat-yaml-as-json
      # converts to a JSON document on stdout; url2code's
      # native_json mode then parses it into `parsed_output`.
      executable: /app/bin/cat-yaml-as-json
      args:
        - "/app/config/categories.yaml"
      timeout_seconds: 5
    output:
      mode: native_json

  - name: admin-library-list
    route: /admin/library/list
    method: POST
    description: >-
      List track names indexed in ``<category>/library.pklz``.
      Each row is one indexed file with its hash count;
      operators correlate the path's basename to their
      canonical ids (the upload was saved as ``<id>.<ext>``).
    command:
      executable: /app/bin/audfprint
      # Just reads the dbase header; never touches audio.
      # 10s is plenty even on the biggest libraries we
      # plan to host.
      timeout_seconds: 10
      args:
        - "list"
        - "-d"
        - "/data/{category}/library.pklz"
        - "-v"
    request:
      validations:
        category:
          type: enum
          choices: [films, tvshows, youtube, shorts, reels]
    output:
      mode: regex_json
      regex:
        flags: [MULTILINE]
        multiple: true
        # audfprint list with -v emits a Python list-repr on a
        # single DEBUG line, like:
        #   DEBUG:audfprint2:['/path/a.wav (123 hashes)', '/path/b.wav (456 hashes)']
        # Match each ``'<path> (<n> hashes)'`` entry separately.
        pattern: |-
          '(?P<track>[^']+?)\s+\((?P<hashes>\d+)\s+hashes\)'
