# needle — audio fingerprint matching, defined entirely in YAML.
#
# Two endpoint shapes per category:
#
#   POST /<category>/identify
#     audfprint match against the category's coarse library
#     pklz; returns the matched file plus a rough offset.
#
#   POST /<category>/timestamps?id=<file_id>
#     audfprint match against the category-and-file-specific
#     fine pklz; returns precise time ranges where the query
#     audio aligns inside that one file.
#
# Both endpoints accept an audio upload as multipart form
# field ``audio`` (mp3/m4a/wav/opus/webm/...). audfprint shells
# out to ffmpeg for decoding, which the Dockerfile installs.
#
# Each ``audfprint match`` invocation runs with -R (find time
# range) and -v (verbose) so the regex parser below can pull
# out duration / start / end / hashes-matched fields.
# Categories with shorter expected content (shorts, reels)
# use a smaller min-count threshold (-N) so a 5-10s query
# still triggers a hit.
#
# The list of valid categories + per-category tuning lives in
# config/categories.yaml (the canonical catalog). This file's
# admin enum lists and per-category tuning are checked against
# the catalog by tests/test_config.py — drift fails CI before
# merge. /admin/categories serves the catalog (converted to
# JSON on the wire by bin/cat-yaml-as-json) so consumers can
# discover valid slugs without reading the README.

api:
  title: needle
  # ``version`` surfaces on GET / so operators can tell
  # which needle build is up by hitting the liveness URL.
  # Bump in lockstep with the git tag + container tag. When
  # unset, url2code falls back to its own engine version,
  # which is misleading on a downstream image -- always
  # set this here.
  version: "0.3.1"
  # API surface lives under /v1/. Liveness ``/`` and the
  # OpenAPI docs ``/docs`` / ``/redocs`` stay at the root.
  # Future breaking changes ship at /v2/ without disturbing
  # existing v1 clients.
  default_root: /v1

logging:
  level: INFO

endpoints:

  # ====================================================================
  # films
  # ====================================================================

  - name: films-identify
    route: /films/identify
    method: POST
    description: >-
      Identify which film the uploaded audio comes from. Matches
      against the category-wide coarse fingerprint database at
      /data/films/library.pklz.
    command:
      executable: /app/bin/audfprint
      # 30s is roomy for an audfprint match against the
      # coarse library on a clip of typical length; quick
      # enough that a wedged worker recovers inside a
      # request-pool slot. Pinned by test_endpoint_timeouts.
      timeout_seconds: 30
      args:
        - "match"
        - "-d"
        - "/data/films/library.pklz"
        - "-R"
        - "-v"
        - "-x"
        - "1"
        - "{audio}"
    uploads:
      - field_name: audio
        placeholder: audio
        temp_dir: /tmp/needle/uploads/films-identify
    output:
      mode: regex_json
      regex:
        flags: [MULTILINE]
        # Captures either a match line (with -R -v) or a NOMATCH
        # line. Caller checks ``no_match`` first; if non-null
        # the audio was not in the library.
        pattern: |-
          (?:Matched\s+(?P<duration>[\d.]+)\s+s\s+starting at\s+(?P<query_start>[\d.]+)\s+s\s+in\s+\S+\s+to time\s+(?P<query_end>[\d.]+)\s+s\s+in\s+(?P<matched>.+?)\s+with\s+(?P<hashes_aligned>\d+)\s+of\s+(?P<hashes_total>\d+)\s+common hashes at rank\s+(?P<rank>\d+))|(?P<no_match>NOMATCH:\s+\S+)

  - name: films-timestamps
    route: /films/timestamps
    method: POST
    description: >-
      For a known film id, return precise time ranges where the
      uploaded audio aligns inside that one file. Matches against
      /data/films/fine/<id>.pklz; up to 5 matches per query.
    command:
      executable: /app/bin/audfprint
      # /timestamps runs against a single high-density
      # per-file dbase and is allowed up to -x 5 matches,
      # so it's measurably slower than /identify. 60s is
      # comfortable on full-film clips; still inside a
      # human request budget.
      timeout_seconds: 60
      args:
        - "match"
        - "-d"
        - "/data/films/fine/{id}.pklz"
        - "-R"
        - "-v"
        - "-x"
        - "5"
        - "{audio}"
    request:
      validations:
        id:
          type: text
    uploads:
      - field_name: audio
        placeholder: audio
        temp_dir: /tmp/needle/uploads/films-timestamps
    output:
      mode: regex_json
      regex:
        flags: [MULTILINE]
        multiple: true
        pattern: |-
          Matched\s+(?P<duration>[\d.]+)\s+s\s+starting at\s+(?P<query_start>[\d.]+)\s+s\s+in\s+\S+\s+to time\s+(?P<query_end>[\d.]+)\s+s\s+in\s+(?P<matched>.+?)\s+with\s+(?P<hashes_aligned>\d+)\s+of\s+(?P<hashes_total>\d+)\s+common hashes at rank\s+(?P<rank>\d+)

