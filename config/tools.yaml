  # ====================================================================
  # shorts (YouTube Shorts) — short-form, lower min-count
  # ====================================================================

  - name: shorts-identify
    route: /shorts/identify
    method: POST
    description: >-
      Identify which YouTube Short the uploaded audio comes from.
      Tuned for ~60s clips: lower -N min-count so a 5-10s query
      still triggers a hit against a short reference.
    command:
      executable: /app/bin/audfprint
      timeout_seconds: 30
      args:
        - "match"
        - "-d"
        - "/data/shorts/library.pklz"
        - "-R"
        - "-v"
        - "-N"
        - "3"
        - "-x"
        - "1"
        - "{audio}"
